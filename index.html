<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andres Guerrero</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --accent: #FF7A18;   /* orange */
      --accent2: #FF4D00;  /* deep orange */
      --accent3: #FFB347;  /* light orange */
      --text: #f6f4f2;
      --muted: #b5ada6;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }

    /* ---------- Background art (black & orange only) ---------- */
    .bg { position: fixed; inset: 0; z-index: -2; overflow: hidden; }
    .blob {
      position: absolute; border-radius: 50%;
      filter: blur(90px); opacity: 0.5;
      animation: float 18s ease-in-out infinite;
    }
    .blob.b1 { width: 500px; height: 500px; background: var(--accent);  top: -130px; left: -110px; }
    .blob.b2 { width: 440px; height: 440px; background: var(--accent2); bottom: -150px; right: -90px; animation-delay: -6s; }
    .blob.b3 { width: 360px; height: 360px; background: var(--accent3); top: 45%; left: 60%; animation-delay: -12s; opacity: 0.35; }
    @keyframes float {
      0%, 100% { transform: translate(0,0) scale(1); }
      33%      { transform: translate(40px,-30px) scale(1.1); }
      66%      { transform: translate(-30px,20px) scale(0.95); }
    }
    .grid {
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,122,24,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,122,24,0.05) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(ellipse at 50% 45%, #000 35%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse at 50% 45%, #000 35%, transparent 80%);
    }

    /* ---------- Profile card ---------- */
    .card { text-align: center; padding: 48px 24px; max-width: 560px; }
    .avatar-ring {
      display: block;
      width: 156px; height: 156px; margin: 0 auto 26px;
      border-radius: 50%; padding: 4px;
      background: conic-gradient(from 0deg, var(--accent), var(--accent3), var(--accent2), var(--accent));
      box-shadow: 0 0 44px rgba(255,77,0,0.5);
      animation: spin 8s linear infinite;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    a.avatar-ring:hover { transform: scale(1.05); box-shadow: 0 0 56px rgba(255,77,0,0.7); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .avatar-ring img {
      width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block;
      background: #111; border: 4px solid var(--bg);
      animation: spin 8s linear infinite reverse;
    }
    h1 {
      margin: 0;
      font-size: clamp(2.3rem, 7vw, 3.8rem); font-weight: 800; letter-spacing: -0.02em;
      background: linear-gradient(90deg, var(--accent3), var(--accent2));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .bio { color: var(--text); margin: 16px 0 0; font-size: 1.1rem; line-height: 1.6; }
    .meta { color: var(--muted); margin: 8px 0 0; font-size: 0.9rem; }

    .cta {
      display: inline-block; margin-top: 34px;
      padding: 14px 30px; border-radius: 999px;
      font-size: 1.02rem; font-weight: 700; text-decoration: none; color: #1a0d00;
      background: linear-gradient(90deg, var(--accent3), var(--accent));
      box-shadow: 0 10px 28px rgba(255,122,24,0.4);
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }
    .cta:hover { transform: translateY(-3px); box-shadow: 0 16px 36px rgba(255,77,0,0.5); }
    .cta span { transition: margin 0.16s ease; }
    .cta:hover span { margin-left: 6px; }
  </style>
</head>
<body>
  <div class="bg">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>
  <div class="grid"></div>

  <main class="card">
    <a class="avatar-ring" href="https://github.com/andresmgsl" target="_blank" rel="noopener" title="Visit my GitHub profile">
      <img src="https://avatars.githubusercontent.com/u/6069831?v=4" alt="Andres Guerrero — GitHub profile" />
    </a>
    <h1>Andres Guerrero</h1>
    <p class="bio">Software Developer 💻 · Builder at @heavy-duty 👷</p>
    <p class="meta">📍 The world</p>
    <a class="cta" href="gallery.html">View QR Gallery <span>→</span></a>
  </main>
</body>
</html>
